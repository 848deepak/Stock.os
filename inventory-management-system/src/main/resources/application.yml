spring:
  application:
    name: Inventory Management System

  datasource:
    url: jdbc:mysql://localhost:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
    show-sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret-key: ${JWT_SECRET:your-super-secret-key-change-this-in-production-environment-immediately}
    expiration: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-secret-key: ${JWT_REFRESH_SECRET:your-super-secret-refresh-key-change-this-in-production-environment-immediately}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:4173}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max-age: ${CORS_MAX_AGE:3600}
  auth-rate-limit:
    max-requests: ${AUTH_RATE_LIMIT_MAX_REQUESTS:20}
    window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

logging:
  level:
    root: INFO
    com.inventory: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
