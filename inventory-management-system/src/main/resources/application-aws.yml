spring:
  application:
    name: inventory-management-system
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventory_db}
    username: ${DB_USER:pgadmin}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: false

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: always
    include-stacktrace: never
    include-exception: false

app:
  jwt:
    secret-key: ${JWT_SECRET:default-secret-key-change-in-production}
    expiration: ${JWT_ACCESS_EXPIRATION_MS:900000}  # 15 minutes
    refresh-secret-key: ${JWT_REFRESH_SECRET:default-refresh-secret-key-change-in-production}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  auth-rate-limit:
    max-requests: ${AUTH_RATE_LIMIT_MAX_REQUESTS:20}
    window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.inventory: ${APP_LOG_LEVEL:INFO}
    org.springframework.web: ${SPRING_LOG_LEVEL:INFO}
    org.hibernate: WARN
    org.hibernate.SQL: ${HIBERNATE_SQL_DEBUG:WARN}
  
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  
  file:
    name: ${LOG_FILE_PATH:/var/log/inventory/app.log}
    max-size: 10MB
    max-history: 30
  
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

# AWS Configuration
aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${S3_BUCKET_NAME:inventory-system-bucket}
    region: ${AWS_REGION:us-east-1}
  
  cloudwatch:
    enabled: true
    log-group-name: ${CLOUDWATCH_LOG_GROUP:/aws/ec2/inventory-app}
    log-stream-name: ${CLOUDWATCH_LOG_STREAM:inventory-app-logs}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      cloudwatch:
        enabled: true
        namespace: InventoryManagementSystem
        step: 1m

---

# Actuator Security
security:
  enable-https: ${ENABLE_HTTPS:false}
  cors-enabled: true
