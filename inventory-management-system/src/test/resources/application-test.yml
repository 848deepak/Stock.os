spring:
  datasource:
    url: jdbc:h2:mem:inventory_test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: false

app:
  jwt:
    secret-key: test-secret-key-for-testing-purposes-only-32-chars
    expiration: 900000
    refresh-secret-key: test-refresh-secret-key-for-testing-purposes-only-32-chars
    refresh-expiration: 604800000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:4173
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600
  auth-rate-limit:
    max-requests: 50
    window-seconds: 60

server:
  port: 8080
  servlet:
    context-path: /api
